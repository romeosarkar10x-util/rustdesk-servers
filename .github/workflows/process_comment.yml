name: Process discussion comment

on:
    discussion_comment:
        types: [created]

jobs:
    process_comment:
        runs-on: ubuntu-latest
        steps:
            - name: Process the comment
              run: |
                  echo "Comment body: ${{ github.event.comment.body }}"
                  echo "Author: ${{ github.event.comment.user.login }}"
                  echo "Discussion title: ${{ github.event.discussion.title }}"

            - name: Delete the comment
              run: |
                  curl -X DELETE \
                      -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                      -H "Accept: application/vnd.github+json" \
                      "https://api.github.com/repos/${{ github.repository }}/discussions/comments/${{ github.event.comment.id }}"
